<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Todo Kanban Board</title>
        <!-- Intentionally missing skip link -->
        <!-- Intentionally missing meta description -->
    </head>
    <body class="bg-gray-900">
        <!-- Intentionally missing main landmark -->
        <div id="app" class="app-container">
            <!-- Header without role -->
            <header class="app-header">
                <!-- Using div instead of h1 for title -->
                <div class="app-title">📋 Todo Kanban Board</div>

                <!-- Toolbar without role or aria-label -->
                <div class="toolbar">
                    <!-- Buttons without proper accessible names -->
                    <button id="btn-new-todo" class="toolbar-btn toolbar-btn-primary">
                        ➕
                    </button>
                    <button id="btn-projects" class="toolbar-btn toolbar-btn-secondary">
                        📁
                    </button>
                    <button id="btn-refresh" class="toolbar-btn toolbar-btn-secondary">
                        🔄
                    </button>
                </div>
            </header>

            <!-- Main Content without proper heading structure -->
            <div class="app-main">
                <div class="kanban-container">
                    <!-- Kanban board without aria-label or role -->
                    <div id="kanban-board"></div>
                </div>
            </div>
        </div>

        <!-- Modal without proper ARIA attributes -->
        <div id="todo-form-modal" class="hidden"></div>

        <!-- Main Application Module -->
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
