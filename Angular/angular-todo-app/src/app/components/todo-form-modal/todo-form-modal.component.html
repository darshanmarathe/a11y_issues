<div class="modal-backdrop" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title">{{ todo() ? 'Edit Todo' : 'Add New Todo' }}</h3>
      <button class="btn-close" (click)="onCancel()"></button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label for="title">Title <span class="required">*</span></label>
        <input 
          type="text" 
          id="title"
          class="form-control" 
          [(ngModel)]="formData().title"
          placeholder="Enter todo title"
          required>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea 
          id="description"
          class="form-control" 
          [(ngModel)]="formData().description"
          placeholder="Enter description"
          rows="3">
        </textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" class="form-control" [(ngModel)]="formData().status">
            @for (status of statuses; track status) {
              <option [value]="status">{{ status }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="priority">Priority</label>
          <select id="priority" class="form-control" [(ngModel)]="formData().priority">
            @for (priority of priorities; track priority) {
              <option [value]="priority">{{ priority }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="targetCompletionDate">Target Completion Date</label>
          <input 
            type="date" 
            id="targetCompletionDate"
            class="form-control" 
            [(ngModel)]="formData().targetCompletionDate">
        </div>

        <div class="form-group">
          <label for="userId">Assign To <span class="required">*</span></label>
          <select id="userId" class="form-control" [(ngModel)]="formData().userId">
            <option value="">Select User</option>
            @for (user of users(); track user.id) {
              <option [value]="user.id">{{ user.name }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="link">Link</label>
        <input 
          type="url" 
          id="link"
          class="form-control" 
          [(ngModel)]="formData().link"
          placeholder="https://example.com">
      </div>

      <div class="form-group">
        <label>Projects</label>
        <div class="projects-checkboxes">
          @for (project of projects(); track project.id) {
            <label class="checkbox-item">
              <input 
                type="checkbox" 
                [checked]="isProjectSelected(project.id)"
                (change)="onProjectChange(project.id, $event)">
              <span>{{ project.name }}</span>
            </label>
          }
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="onCancel()">Cancel</button>
      <button class="btn btn-primary" (click)="onSave()">
        {{ todo() ? 'Update' : 'Create' }} Todo
      </button>
    </div>
  </div>
</div>
