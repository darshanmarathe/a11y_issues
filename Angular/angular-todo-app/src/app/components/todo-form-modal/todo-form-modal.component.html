<div class="modal-backdrop" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ todo() ? 'Edit Todo' : 'Add New Todo' }}</h3>
      <button class="btn-close" (click)="onCancel()">×</button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Title <span style="color: red">*</span></label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="formData().title"
          placeholder="Enter todo title">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea
          class="form-control"
          [(ngModel)]="formData().description"
          placeholder="Enter description"
          rows="3">
        </textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select class="form-control" [(ngModel)]="formData().status">
            @for (status of statuses; track status) {
              <option [style.color]="getStatusColor(status)">{{ status }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>Priority</label>
          <select class="form-control" [(ngModel)]="formData().priority">
            @for (priority of priorities; track priority) {
              <option [value]="priority">{{ priority }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Target Completion Date</label>
          <input
            type="date"
            class="form-control"
            [(ngModel)]="formData().targetCompletionDate">
        </div>

        <div class="form-group">
          <label>Assign To <span style="color: red">*</span></label>
          <select class="form-control" [(ngModel)]="formData().userId">
            <option value="">Select User</option>
            @for (user of users(); track user.id) {
              <option [value]="user.id">{{ user.name }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Link</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="formData().link"
          placeholder="https://example.com">
      </div>

      <div class="form-group">
        <label>Projects</label>
        <div class="projects-checkboxes">
          @for (project of projects(); track project.id) {
            <label>
              <input
                type="checkbox"
                [checked]="isProjectSelected(project.id)"
                (change)="onProjectChange(project.id, $event)">
              {{ project.name }}
            </label>
          }
        </div>
      </div>

      <div style="color: #999; font-size: 12px; margin-top: 10px;">
        Fields marked with * are required
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="onCancel()">Cancel</button>
      <button class="btn btn-primary" (click)="onSave()">
        {{ todo() ? 'Update' : 'Create' }} Todo
      </button>
    </div>
  </div>
</div>
